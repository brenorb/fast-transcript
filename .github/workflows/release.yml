name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset_suffix: macos-arm64
            python_version: "3.12"
          - os: ubuntu-latest
            asset_suffix: linux-x86_64
            python_version: "3.12"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}
      - uses: astral-sh/setup-uv@v6
      - name: Build release binary
        run: cargo build --release --locked
      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME:-dev}"
          archive="fast-transcript-${version}-${{ matrix.asset_suffix }}.tar.gz"
          mkdir -p dist/staging
          cp target/release/fscript dist/staging/
          cp README.md LICENSE dist/staging/
          tar -C dist/staging -czf "dist/${archive}" fscript README.md LICENSE
          shasum -a 256 "dist/${archive}" > "dist/${archive}.sha256"
      - name: Build PyPI wheel
        run: uv run --no-project --with build python scripts/build_pypi_wheel.py --out-dir dist-pypi
      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.asset_suffix }}
          path: dist/*
          if-no-files-found: error
      - uses: actions/upload-artifact@v5
        with:
          name: pypi-${{ matrix.asset_suffix }}
          path: dist-pypi/*.whl
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist-pypi
      - name: Collect wheels
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p publish-dist
          find dist-pypi -type f -name '*.whl' -exec cp {} publish-dist/ \;
      - name: Publish wheel(s) to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: publish-dist
          skip-existing: true
          verbose: true
