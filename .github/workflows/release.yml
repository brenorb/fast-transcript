name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset_suffix: macos-arm64
          - os: ubuntu-latest
            asset_suffix: linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release --locked
      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME:-dev}"
          archive="fast-transcript-${version}-${{ matrix.asset_suffix }}.tar.gz"
          mkdir -p dist/staging
          cp target/release/fscript dist/staging/
          cp README.md LICENSE dist/staging/
          tar -C dist/staging -czf "dist/${archive}" fscript README.md LICENSE
          shasum -a 256 "dist/${archive}" > "dist/${archive}.sha256"
      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.asset_suffix }}
          path: dist/*
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
