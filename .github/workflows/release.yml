name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset_suffix: macos-arm64
            artifact_name: macos
            python_version: "3.12"
          - os: ubuntu-latest
            asset_suffix: linux-x86_64
            artifact_name: linux
            python_version: "3.12"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}
      - uses: astral-sh/setup-uv@v6
      - name: Build release binary
        run: cargo build --release --locked
      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME:-dev}"
          archive="fast-transcript-${version}-${{ matrix.asset_suffix }}.tar.gz"
          mkdir -p dist/staging
          cp target/release/fscript dist/staging/
          cp README.md LICENSE dist/staging/
          tar -C dist/staging -czf "dist/${archive}" fscript README.md LICENSE
          shasum -a 256 "dist/${archive}" > "dist/${archive}.sha256"
      - name: Build PyPI wheel
        run: uv run --no-project --with build python scripts/build_pypi_wheel.py --out-dir dist-pypi
      - name: Validate release binary and wheel stay in sync
        run: uv run --no-project python -m unittest tests/test_release_artifacts.py
      - name: Smoke test installed wheel entrypoint
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .wheel-smoke
          . .wheel-smoke/bin/activate
          python -m pip install dist-pypi/*.whl
          fscript --version
          fscript --help >/dev/null
      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error
      - uses: actions/upload-artifact@v5
        with:
          name: pypi-${{ matrix.artifact_name }}
          path: dist-pypi/*.whl
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: pypi-macos
          path: dist-pypi
      - name: Collect wheels
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p publish-dist
          find dist-pypi -type f -name '*.whl' -exec cp {} publish-dist/ \;
      - name: Publish wheel(s) to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: publish-dist
          skip-existing: true
          verbose: true

  publish-crates-io:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Check whether crate version is already published
        id: crate-state
        shell: bash
        run: |
          set -euo pipefail
          read -r crate_name crate_version <<EOF
          $(cargo metadata --no-deps --format-version 1 | python3 -c 'import json, sys; pkg = json.load(sys.stdin)["packages"][0]; print(pkg["name"], pkg["version"])')
          EOF
          api_url="https://crates.io/api/v1/crates/${crate_name}"
          published_version=""
          if published_version="$(curl -fsSL "${api_url}" | python3 -c 'import json, sys; print(json.load(sys.stdin)["crate"]["newest_version"])' 2>/dev/null)"; then
            :
          else
            published_version=""
          fi

          if [ "${published_version}" = "${crate_version}" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "${crate_name} ${crate_version} is already published on crates.io; skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: rust-lang/crates-io-auth-action@v1
        if: steps.crate-state.outputs.already_published != 'true'
        id: auth
      - name: Publish crate to crates.io
        if: steps.crate-state.outputs.already_published != 'true'
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Skip crates.io publish
        if: steps.crate-state.outputs.already_published == 'true'
        run: echo "Publish skipped because this version is already available on crates.io."
