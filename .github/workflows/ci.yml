name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --check
      - name: Test
        run: cargo test --locked
      - name: Publish dry run
        run: cargo publish --dry-run --locked

  pypi-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - name: Build release binary
        run: cargo build --release --locked
      - name: Python wrapper tests
        run: uv run --no-project python -m unittest tests/test_pypi_wrapper.py
      - name: Build wheel
        run: uv run --no-project --with build python scripts/build_pypi_wheel.py --out-dir dist-pypi
      - name: Validate release binary and wheel stay in sync
        run: uv run --no-project python -m unittest tests/test_release_artifacts.py
      - name: Smoke test installed wheel entrypoint
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .wheel-smoke
          . .wheel-smoke/bin/activate
          python -m pip install dist-pypi/*.whl
          fscript --version
          fscript --help >/dev/null
